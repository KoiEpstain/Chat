<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Chat IRC</title>

<!-- Cliente KiwiIRC -->
<script src="https://kiwiirc.com/nextclient/kiwiirc.js"></script>

<style>
body {
  margin:0;
  background:#0f0f0f;
  font-family: Arial, sans-serif;
}
#chat {
  height:100vh;
}
</style>

</head>

<body>

<div id="chat"></div>

<script>
var kiwi = new KiwiIRC({
    container: '#chat',

    // servidor IRC
    server: 'irc.libera.chat',

    // puerto websocket
    port: 6697,
    tls: true,

    // canal al que entrar automáticamente
    channel: '#micanal',

    // nickname inicial
    nick: 'Invitado_' + Math.floor(Math.random() * 9999)
});
</script>

</body>
</html>
